name: symtickets_mobile
description: Aplicación móvil para sistema SymTickets CCTV
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  dartz: ^0.10.1

  # Dependency Injection
  get_it: ^9.0.5

  # HTTP Client
  dio: ^5.4.0

  # Routing
  go_router: ^17.0.0

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0

  # UI Components
  intl: ^0.20.2

  # Icons
  cupertino_icons: ^1.0.8

  # Camera & Gallery
  image_picker: ^1.0.7
  
  # Signature
  signature: ^5.4.1
  
  # Geolocation
  geolocator: ^11.0.0
  
  # Offline Support
  connectivity_plus: ^5.0.2
  
  # UI Enhancements
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  
  # Utilities
  timeago: ^3.6.1
  url_launcher: ^6.2.4
  path_provider: ^2.1.2
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
